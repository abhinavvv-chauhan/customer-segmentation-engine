name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync

    - name: Run Ruff Lint and Format
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Run mypy
      run: uv run mypy src

    # - name: Run pytest
    #   run: uv run pytest tests/
